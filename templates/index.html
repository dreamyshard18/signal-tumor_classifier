<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Signal: Brain Tumour Classifier</title>
    <style>
        /* The entire page background setup */
        body {
            font-family: 'Segoe UI', -apple-system, BlinkMacSystemFont, Roboto, sans-serif;
            background-color: #05020a;
            background-image: radial-gradient(circle at 50% 50%, #0c051c 0%, #020005 100%);
            color: #E0D5FA;
            margin: 0;
            padding: 40px 20px;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            box-sizing: border-box;
            position: relative;
            overflow-x: hidden;
        }

        /* Subtle ambient medical grid lines */
        body::before {
            content: "";
            position: absolute;
            top: 0; left: 0; right: 0; bottom: 0;
            background-image: linear-gradient(rgba(139, 92, 246, 0.02) 1px, transparent 1px),
                              linear-gradient(90deg, rgba(139, 92, 246, 0.02) 1px, transparent 1px);
            background-size: 40px 40px;
            background-position: center;
            z-index: 1;
            pointer-events: none;
        }

        /* GIANT NEON BG BRAIN - Pure Code & Fully Responsive */
        .bg-brain-svg {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            width: 85vw;
            max-width: 900px;
            height: auto;
            opacity: 0.18;
            z-index: 0;
            pointer-events: none;
            /* Neon glowing effect applied to the vectors */
            filter: drop-shadow(0 0 15px #a855f7) drop-shadow(0 0 40px #6b21a8);
            animation: brainPulse 4s infinite ease-in-out;
        }

        @keyframes brainPulse {
            0%, 100% { opacity: 0.15; filter: drop-shadow(0 0 12px #a855f7) drop-shadow(0 0 35px #6b21a8); }
            50% { opacity: 0.23; filter: drop-shadow(0 0 25px #c084fc) drop-shadow(0 0 60px #7c3aed); }
        }

        /* App Container */
        .container {
            width: 100%;
            max-width: 500px;
            background: rgba(10, 5, 24, 0.8);
            padding: 45px 40px;
            border-radius: 24px;
            text-align: center;
            box-shadow: 0 25px 60px rgba(0, 0, 0, 0.8), 
                        0 0 50px rgba(168, 85, 247, 0.15);
            border: 1px solid rgba(168, 85, 247, 0.25);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            z-index: 2; /* Sits completely on top of the background brain */
        }

        /* App Title: Bold, Purple, Professional */
        h2 {
            font-weight: 800;
            font-size: 2.1rem;
            color: #C084FC;
            text-shadow: 0 0 15px rgba(192, 132, 252, 0.5);
            margin-top: 0;
            margin-bottom: 5px;
            letter-spacing: -0.5px;
        }

        .subtitle {
            font-size: 0.85rem;
            color: #A855F7;
            text-transform: uppercase;
            letter-spacing: 3px;
            margin-bottom: 40px;
            font-weight: 600;
            opacity: 0.8;
        }

        /* Custom File Interface */
        .file-upload-wrapper {
            margin-bottom: 30px;
        }

        input[type="file"] {
            display: none;
        }

        .file-label {
            display: inline-block;
            padding: 14px 28px;
            background: rgba(30, 17, 58, 0.6);
            border: 1px solid #6B21A8;
            color: #E9D5FF;
            border-radius: 10px;
            cursor: pointer;
            font-weight: 600;
            transition: all 0.2s ease;
        }

        .file-label:hover {
            background: rgba(45, 25, 86, 0.8);
            border-color: #A855F7;
            box-shadow: 0 0 15px rgba(168, 85, 247, 0.3);
        }

        /* Big 3D Tactile Action Button */
        button {
            width: 100%;
            padding: 20px 30px;
            font-size: 1.2rem;
            font-weight: 800;
            text-transform: uppercase;
            letter-spacing: 1.5px;
            border: none;
            border-radius: 14px;
            color: white;
            background: linear-gradient(to bottom, #B55FE6 0%, #A855F7 10%, #7C3AED 100%);
            cursor: pointer;
            position: relative;
            box-shadow: 0 8px 0 #5B21B6, 
                        0 15px 30px rgba(0, 0, 0, 0.6),
                        0 0 25px rgba(124, 58, 237, 0.3);
            transition: transform 0.1s ease, box-shadow 0.1s ease;
        }

        button:hover {
            background: linear-gradient(to bottom, #C084FC 0%, #B55FE6 10%, #8B5CF6 100%);
            box-shadow: 0 8px 0 #5B21B6, 
                        0 15px 35px rgba(139, 92, 246, 0.4);
        }

        button:active {
            box-shadow: 0 2px 0 #5B21B6, 
                        0 5px 15px rgba(0, 0, 0, 0.6);
            transform: translateY(6px);
        }

        /* Image Scan Preview Layout */
        img {
            margin-top: 35px;
            max-width: 100%;
            max-height: 260px;
            border-radius: 14px;
            border: 2px solid rgba(168, 85, 247, 0.4);
            box-shadow: 0 0 25px rgba(0, 0, 0, 0.8);
            display: block;
            margin-left: auto;
            margin-right: auto;
        }

        img[src=""], img:not([src]) {
            display: none;
        }

        /* Dynamic Alert Boxes */
        .result-box {
            margin-top: 35px;
            padding: 22px;
            border-radius: 14px;
            font-weight: 700;
            font-size: 1.15rem;
            display: none;
        }

        .result-box.active {
            display: block;
        }

        .positive-box {
            background-color: rgba(239, 68, 68, 0.12);
            border: 1px solid #EF4444;
            box-shadow: 0 0 20px rgba(239, 68, 68, 0.25);
            color: #FEE2E2;
        }

        .negative-box {
            background-color: rgba(16, 185, 129, 0.12);
            border: 1px solid #10B981;
            box-shadow: 0 0 20px rgba(16, 185, 129, 0.25);
            color: #D1FAE5;
        }

        small {
            display: block;
            margin-top: 8px;
            font-weight: 400;
            opacity: 0.85;
        }
    </style>
</head>
<body>

<svg class="bg-brain-svg" viewBox="0 0 24 24" fill="none" stroke="#a855f7" stroke-width="0.6" stroke-linecap="round" stroke-linejoin="round" xmlns="http://www.w3.org/2000/svg">
    <path d="M12 22c-2.5 0-5.5-1.5-6.5-4-1-2.5-.5-5.5-2-7.5s-2-2.5-1.5-5.5c.3-2 1.5-4 3.5-4.5 2.5-.5 4.5.5 6.5 1.5" />
    <path d="M12 6.5c-1-1.5-2.5-3-4.5-3.5-1.5-.2-3 1-3.5 2.5C3.5 7 4 9 3.5 10c-.5.8-1.5 1.2-1.5 2.5 0 2 1.5 3.5 2.5 4.5" />
    <path d="M12 18.5c-1.5.5-3.5 0-4.5-1.5-1-1.5-.5-4-2-5" />
    <path d="M7 10.5c-1-.5-2 0-2.5 1s0 2.5-1 3" />
    <path d="M12 14c-1.5 0-3-1-3.5-2.5s.5-3.5 2-4" />
    <path d="M8.5 7.5C7 7 6.5 5.5 7.5 4.5" />
    
    <path d="M12 22c2.5 0 5.5-1.5 6.5-4 1-2.5.5-5.5 2-7.5s2-2.5 1.5-5.5c-.3-2-1.5-4-3.5-4.5-2.5-.5-4.5.5-6.5 1.5" />
    <path d="M12 6.5c1-1.5 2.5-3 4.5-3.5 1.5-.2 3 1 3.5 2.5.5 1.5 0 3.5.5 4.5.5.8 1.5 1.2 1.5 2.5 0 2-1.5 3.5-2.5 4.5" />
    <path d="M12 18.5c1.5.5 3.5 0 4.5-1.5 1-1.5.5-4 2-5" />
    <path d="M17 10.5c1-.5 2 0 2.5 1s0 2.5 1 3" />
    <path d="M12 14c1.5 0 3-1 3.5-2.5s-.5-3.5-2-4" />
    <path d="M15.5 7.5c1.5-.5 2-2 1-3" />
    
    <path d="M11 19v2.5c0 .8.7 1.5 1.5 1.5h0c.8 0 1.5-.7 1.5-1.5V19" />
</svg>

<div class="container">
    <h2>Signal: Brain Tumour Classifier</h2>
    <div class="subtitle">Neural Diagnostic Interface</div>

    <div class="file-upload-wrapper">
        <label for="imageInput" class="file-label">Select Source MRI Scan</label>
        <input type="file" id="imageInput" accept="image/*" onchange="updateFileName(this)">
        <div id="fileName" style="margin-top: 10px; font-size: 0.85rem; color: #A78BFA; min-height: 1.2em;"></div>
    </div>

    <button onclick="uploadImage()">Execute Prediction</button>

    <img id="preview">

    <div id="resultBox" class="result-box">
        <div id="resultText"></div>
    </div>
</div>

<script>
function updateFileName(input) {
    const fileNameDiv = document.getElementById("fileName");
    if(input.files && input.files[0]) {
        fileNameDiv.textContent = `Target: ${input.files[0].name}`;
    } else {
        fileNameDiv.textContent = "";
    }
}

function uploadImage() {
    const fileInput = document.getElementById("imageInput");
    const file = fileInput.files[0];

    if (!file) {
        alert("Please select an image");
        return;
    }

    document.getElementById("preview").src = URL.createObjectURL(file);

    const formData = new FormData();
    formData.append("file", file);

    fetch("/predict", {
        method: "POST",
        body: formData
    })
    .then(res => res.json())
    .then(data => {
        const resultBox = document.getElementById("resultBox");
        const resultText = document.getElementById("resultText");

        const prediction = data.prediction.toLowerCase();
        const confidence = data.confidence;

        const labels = {
            "glioma": "Glioma Tumor Detected",
            "meningioma": "Meningioma Tumor Detected",
            "pituitary": "Pituitary Tumor Detected",
            "notumor": "No Tumor Detected"
        };

        const finalLabel = labels[prediction] || prediction;

        let boxClass = (prediction === "notumor") ? "negative-box" : "positive-box";
        
        resultBox.className = "result-box active " + boxClass;

        let warning = "";
        if (confidence < 60) {
            warning = "<br><small>⚠️ Low confidence profile — manual clinical review advised</small>";
        }

        resultText.innerHTML = `
            ${finalLabel} <br>
            Confidence: ${confidence}% ${warning}
        `;
    });
}
</script>

</body>
</html>
